<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personal Course Organizer | أضف كورس</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Personal Course Organizer</h1>
      <p>نظّم مسيرتك التعليمية بذكاء</p>
    </header>

    <nav>
      <a href="index.html"> الرئيسية</a>
      <a href="my-courses.html"> كورساتي</a>
      <a href="add-course.html"> أضف كورس</a>
      <a href="contact-us.html"> اتصل بنا</a>
    </nav>

    <main>
      <section class="form-section">
        <h2>إضافة كورس جديد</h2>
        <form>
          <label for="courseName">اسم الكورس:</label>
          <input
            type="text"
            id="courseName"
            name="courseName"
            required
            placeholder="مثال: English"
          />

          <label for="lecturer">المحاضر:</label>
          <input
            type="text"
            id="lecturer"
            name="lecturer"
            required
            placeholder="اسم المحاضر"
          />

          <label for="hours">الساعات المعتمدة:</label>
          <input
            type="number"
            id="hours"
            name="hours"
            min="1"
            max="6"
            required
            placeholder="مثال: 3"
          />

          <label for="notes">ملاحظات:</label>
          <textarea
            id="notes"
            name="notes"
            rows="4"
            placeholder="أي ملاحظات إضافية..."
          ></textarea>

          <button type="submit">أضف الكورس</button>
        </form>
      </section>
    </main>

    <footer>
      <p>© 2026 Personal Course Organizer - جميع الحقوق محفوظة</p>
    </footer>
  </body>
</html>
